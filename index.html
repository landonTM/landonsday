<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landon's Day</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const slides = document.querySelectorAll('.slider img');
            let current = 0;
            slides[current].classList.add('active');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 4000);
        });
    </script>
</head>
<body>

    <header>
        <h1>Landon's Day</h1>
    </header>

        <div class="slider">
        <img src="./assets/images/disney1.jpg" alt="Disney 1" class="active">
        <img src="./assets/images/bray.jpg" alt="Bray">
        <img src="./assets/images/miley.jpg" alt="Miley">
        <img src="./assets/images/zoo1.jpg" alt="Zoo">
        <img src="./assets/images/dc1.jpg" alt="DC 1">
        <img src="./assets/images/disney2.jpg" alt="Disney 2">
        <img src="./assets/images/ciccu.jpg" alt="Ciccu">
        <img src="./assets/images/aj.jpg" alt="AJ">
    </div>

    <div class="category-bar">
        <a class="category-tile" href="wrestling.html"><img src="./assets/images/wrestling.png" alt="Wrestling"></a>
        <a class="category-tile" href="marvel.html"><img src="./assets/images/marvel.png" alt="Marvel"></a>
        <a class="category-tile" href="movies.html"><img src="./assets/images/movies.png" alt="Movies"></a>
        <a class="category-tile" href="games.html"><img src="./assets/images/games.png" alt="Games"></a>
        <a class="category-tile" href="rosie.html"><img src="./assets/images/rosie.jpg" alt="Rosie"></a>
        <a class="category-tile" href="life.html"><img src="./assets/images/life.png" alt="Life"></a>
    </div>

    <div class="content-section" id="wrestling">
        <h2>WRESTLING</h2>
        <div class="content-row">
            <div class="content-card"><img src="./assets/images/wrestlemania.jpg" alt="WrestleMania"></div>
            <div class="content-card"><img src="./assets/images/summerslam.jpg" alt="SummerSlam"></div>
        </div>
    </div>

    <div class="content-section" id="marvel">
        <h2>MARVEL</h2>
        <div class="content-row">
            <div class="content-card"><img src="./assets/images/infinitywar.jpg" alt="Infinity War"></div>
            <div class="content-card"><img src="./assets/images/endgame.jpg" alt="Endgame"></div>
        </div>
    </div>

    <div class="content-section" id="movies">
        <h2>MOVIES</h2>
        <div class="content-row">
            <div class="content-card"><img src="./assets/images/trumanshow.jpg" alt="The Truman Show"></div>
            <div class="content-card"><img src="./assets/images/barbie.jpg" alt="Barbie"></div>
        </div>
    </div>

    <div class="content-section" id="games">
        <h2>GAMES</h2>
        <div class="content-row">
            <div class="content-card"><img src="./assets/images/marvelrivals.jpg" alt="Marvel Rivals"></div>
            <div class="content-card"><img src="./assets/images/marioparty.jpg" alt="Mario Party Jamboree"></div>
        </div>
    </div>

    <div class="content-section" id="rosie">
        <h2>ROSIE</h2>
        <div class="content-row">
            <div class="content-card"><img src="./assets/images/rosiecard.jpg" alt="Rosie"></div>
            <div class="content-card"><img src="./assets/images/daisycard.jpg" alt="Daisy"></div>
        </div>
    </div>

    <div class="content-section" id="life">
        <h2>LIFE</h2>
        <div class="content-row">
            <div class="content-card"><img src="./assets/images/dc2023.jpg" alt="DC 2023"></div>
            <div class="content-card"><img src="./assets/images/disney2022.jpg" alt="Disney 2022"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Landon's Day. All rights reserved.</p>
    </footer>

</body>
</html>
