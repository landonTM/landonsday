<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel — Landon's Day</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Marvel — Landon's Day">
    <meta property="og:description" content="Every MCU movie and show, rated and reviewed one by one, from Blade to Phase Five.">
    <meta property="og:url" content="https://www.landonday.com/marvel">
    <meta property="og:image" content="https://www.landonday.com/assets/images/infinitywar.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Marvel — Landon's Day">
    <meta name="twitter:description" content="Every MCU movie and show, rated and reviewed one by one, from Blade to Phase Five.">
    <meta name="twitter:image" content="https://www.landonday.com/assets/images/infinitywar.jpg">

</head>
<body>

        <nav class="site-nav">
        <a class="site-nav-logo" href="index">Landon's Day</a>
        <div class="site-nav-links">
            <a class="site-nav-link active" href="marvel">Marvel</a>
            <a class="site-nav-link" href="movies">Movies</a>
            <a class="site-nav-link" href="rosie">Rosie</a>
            <a class="site-nav-link" href="games">Games</a>
            <a class="site-nav-link" href="life">Life</a>
            <a class="site-nav-link" href="wrestling">Wrestling</a>
        </div>
    </nav>

    <svg width="0" height="0" style="position:absolute;">
        <filter id="heroSharpen">
            <feConvolveMatrix order="3" preserveAlpha="true"
                kernelMatrix="0 -1 0 -1 5 -1 0 -1 0" />
        </filter>
    </svg>

    <div class="page-hero">
        <video src="./assets/images/marvel-intro.mp4" autoplay muted loop playsinline></video>
        <h1 class="page-hero-title">Marvel</h1>
    </div>

    <div id="rows-container"></div>

    <div class="modal-overlay" id="reviewModal">
        <div class="modal-box">
            <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
            <div class="modal-poster-row">
                <div class="modal-poster-thumb" id="modalPosterThumb">
                    <img id="modalPosterImg" src="" alt="" loading="lazy"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="modal-poster-thumb-fallback">🎬</div>
                </div>
                <div class="modal-header-info">
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-meta" id="modalMeta"></div>
                </div>
            </div>
            <div class="modal-episodes" id="modalEpisodes" style="display:none;"></div>
            <div class="modal-season-label" id="modalSeasonLabel" style="display:none;">Season Overall</div>
            <div class="modal-rating" id="modalRating"></div>
            <div class="modal-review" id="modalReview"></div>
            <div class="modal-last-watched" id="modalLastWatched" style="display:none;"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Landon's Day. All rights reserved.</p>
    </footer>

    <script>
        const CATEGORY_ORDER = [
            { key: "watching", label: "Up Next" },
            { key: "blade", label: "Blade Trilogy" },
            { key: "xmen", label: "X-Men Universe" },
            { key: "raimi", label: "Sony's Spider-Man (Raimi & Webb)" },
            { key: "otherpre", label: "Other Pre-MCU Marvel Films" },
            { key: "p1", label: "MCU — Phase One" },
            { key: "p2", label: "MCU — Phase Two" },
            { key: "tv", label: "Marvel Television (Netflix & ABC)" },
            { key: "p3", label: "MCU — Phase Three" },
            { key: "sony", label: "Sony's Spider-Man Universe" },
            { key: "p4", label: "MCU — Phase Four" },
            { key: "p5", label: "MCU — Phase Five" }
        ];

        async function loadMarvel() {
            const res = await fetch('data/marvel.json');
            const data = await res.json();
            const container = document.getElementById('rows-container');

            CATEGORY_ORDER.forEach(cat => {
                const items = data.filter(item => item.category === cat.key);
                if (items.length === 0) return;

                const section = document.createElement('div');
                section.className = 'mcu-row-section';

                const heading = document.createElement('h2');
                heading.className = 'mcu-row-heading';
                heading.textContent = cat.label;
                section.appendChild(heading);

                const rowWrap = document.createElement('div');
                rowWrap.className = 'poster-row-wrap';

                const row = document.createElement('div');
                row.className = 'poster-row';

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'poster-card';
                    card.setAttribute('data-title', item.title);
                    card.setAttribute('tabindex', '0');
                    card.setAttribute('role', 'button');
                    card.setAttribute('aria-label', item.title);
                    card.innerHTML = `
                        <img src="./assets/images/marvel/${item.poster}" alt="${item.title}" loading="lazy"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="poster-fallback">${item.title}</div>
                        ${item.rating ? `<div class="poster-rating-badge">${item.rating}</div>` : ''}
                    `;
                    card.addEventListener('click', () => openModal(item));
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openModal(item);
                        }
                    });
                    row.appendChild(card);
                });

                rowWrap.appendChild(row);
                section.appendChild(rowWrap);
                container.appendChild(section);
            });
        }

        function renderStarDisplay(ratingText) {
            if (!ratingText || ratingText.includes('-')) return ratingText || '';
            const full = (ratingText.match(/⭐/g) || []).length;
            const hasFraction = /[¾½¼]/.test(ratingText);
            const used = full + (hasFraction ? 1 : 0);
            const empty = Math.max(0, 5 - used);
            return empty > 0
                ? `${ratingText}<span class="modal-rating-empty">${'☆'.repeat(empty)}</span>`
                : ratingText;
        }

        function applyRatingAccent(ratingText) {
            const box = document.querySelector('.modal-box');
            if (!ratingText) {
                box.style.setProperty('--modal-accent', '#2c2c2c');
                box.style.setProperty('--modal-accent-glow', 'transparent');
                return;
            }
            let value;
            if (ratingText.includes('-')) {
                value = -1;
            } else {
                const full = (ratingText.match(/⭐/g) || []).length;
                const fraction = ratingText.includes('¾') ? 0.75 : ratingText.includes('½') ? 0.5 : ratingText.includes('¼') ? 0.25 : 0;
                value = full + fraction;
            }
            let color, glow;
            if (value < 0 || value < 2.5) {
                color = '#e05c5c'; glow = 'rgba(224, 92, 92, 0.15)';
            } else if (value < 4) {
                color = '#ffd54a'; glow = 'rgba(255, 213, 74, 0.15)';
            } else {
                color = '#6fdc8c'; glow = 'rgba(111, 220, 140, 0.15)';
            }
            box.style.setProperty('--modal-accent', color);
            box.style.setProperty('--modal-accent-glow', glow);
        }

        function openModal(item) {
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalMeta').textContent = `${item.year} • ${item.type}`;

            const posterImg = document.getElementById('modalPosterImg');
            const posterFallback = document.querySelector('.modal-poster-thumb-fallback');
            posterImg.style.display = 'block';
            posterFallback.style.display = 'none';
            posterImg.src = `./assets/images/marvel/${item.poster}`;
            posterImg.alt = item.title;

            const episodesEl = document.getElementById('modalEpisodes');
            if (item.episodes && item.episodes.length > 0) {
                episodesEl.innerHTML = item.episodes.map(ep =>
                    `<div class="modal-episode-row"><span class="ep-name">${ep.title}</span><span class="ep-rating">${ep.rating || ''}</span></div>`
                ).join('');
                episodesEl.style.display = 'block';
                document.getElementById('modalSeasonLabel').style.display = 'block';
            } else {
                episodesEl.style.display = 'none';
                episodesEl.innerHTML = '';
                document.getElementById('modalSeasonLabel').style.display = 'none';
            }

            const ratingEl = document.getElementById('modalRating');
            ratingEl.innerHTML = item.rating ? renderStarDisplay(item.rating) : '';
            applyRatingAccent(item.rating);

            const reviewEl = document.getElementById('modalReview');
            const lastWatchedEl = document.getElementById('modalLastWatched');
            if (item.review) {
                const match = item.review.match(/^([\s\S]*?)\n\n(Last Watched:.+)$/);
                if (match) {
                    reviewEl.textContent = match[1];
                    lastWatchedEl.textContent = match[2];
                    lastWatchedEl.style.display = 'block';
                } else {
                    reviewEl.textContent = item.review;
                    lastWatchedEl.style.display = 'none';
                }
                reviewEl.classList.remove('pending');
            } else {
                reviewEl.textContent = "Review coming soon!";
                reviewEl.classList.add('pending');
                lastWatchedEl.style.display = 'none';
            }

            document.getElementById('reviewModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('reviewModal').classList.remove('open');
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('reviewModal').addEventListener('click', (e) => {
            if (e.target.id === 'reviewModal') closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        loadMarvel();
    </script>


    <button class="back-to-top-btn" id="backToTopBtn" aria-label="Back to top" title="Back to top">&uarr;</button>

    <script>
        (function () {
            const btn = document.getElementById('backToTopBtn');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });
            btn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();
    </script>
</body>
</html>
