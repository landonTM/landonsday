<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games — Landon's Day</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Games — Landon's Day">
    <meta property="og:description" content="My game library and stats, coming soon.">
    <meta property="og:url" content="https://www.landonday.com/games">
    <meta property="og:image" content="https://www.landonday.com/assets/images/games.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Games — Landon's Day">
    <meta name="twitter:description" content="My game library and stats, coming soon.">
    <meta name="twitter:image" content="https://www.landonday.com/assets/images/games.png">

</head>
<body class="games-page">

        <nav class="site-nav">
        <a class="site-nav-logo" href="index">Landon's Day</a>
        <div class="site-nav-links">
            <a class="site-nav-link" href="marvel">Marvel</a>
            <a class="site-nav-link" href="movies">Movies</a>
            <a class="site-nav-link" href="rosie">Rosie</a>
            <a class="site-nav-link active" href="games">Games</a>
            <a class="site-nav-link" href="life">Life</a>
            <a class="site-nav-link" href="wrestling">Wrestling</a>
        </div>
    </nav>

    <div class="page-hero">
        <img src="./assets/images/games.png" alt="Games">
        <h1 class="page-hero-title">Games</h1>
    </div>

    <div class="stats-strip" id="statsStrip">
        <!-- filled in by JS -->
    </div>
    <p id="lastUpdatedCaption" style="text-align: center; color: #666; font-size: 0.8rem; margin: -0.5rem 0 1.5rem;"></p>

    <div class="mcu-row-section" id="mostPlayedSection" style="display:none;">
        <h2 class="mcu-row-heading">Most Played</h2>
        <div class="poster-row-wrap">
            <div class="poster-row" id="mostPlayedRow"></div>
        </div>
    </div>

    <div class="movies-section" id="hypixelSection">
        <h2 class="movies-section-heading" style="text-align:center;">Hypixel Stats</h2>
        <p class="movies-section-subheading" id="hypixelUpdatedCaption" style="text-align:center;"></p>
        <div class="hypixel-layout">
            <div class="hypixel-left-col">
                <canvas id="skinCanvas" class="skin-canvas"></canvas>
                <canvas id="skinCanvas2" class="skin-canvas"></canvas>
            </div>
            <div class="hypixel-right-col">
                <div class="hypixel-general-strip" id="hypixelGeneralStrip"></div>
                <div class="hypixel-game-grid" id="hypixelGameGrid"></div>
                <div class="skyblock-panel" id="skyblockPanel"></div>
            </div>
        </div>
    </div>

    <div class="movies-section">
        <h2 class="movies-section-heading">Full Library</h2>
        <p class="movies-section-subheading">Every game in my Steam library. Click a column header to sort, or click a row to open its store page.</p>
        <input type="text" class="archive-search" id="librarySearch" placeholder="Search my library...">
        <table class="library-table" id="libraryTable">
            <thead>
                <tr>
                    <th data-sort="name">Game</th>
                    <th data-sort="hours">Hours Played</th>
                    <th data-sort="pct">% of Playtime</th>
                    <th data-sort="recent">Last Played</th>
                </tr>
            </thead>
            <tbody id="libraryTableBody"></tbody>
        </table>
        <div class="archive-pagination" id="libraryPagination"></div>
    </div>

    <footer>
        <p>&copy; 2026 Landon's Day. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.4.1/bundles/skinview3d.bundle.js"></script>
    <script>
        (function () {
            const canvas = document.getElementById("skinCanvas");
            try {
                const skinViewer = new skinview3d.SkinViewer({
                    canvas: canvas,
                    width: 260,
                    height: 380,
                    skin: "./assets/images/skin.png"
                });
                skinViewer.controls.enableRotate = true;
                skinViewer.controls.enableZoom = true;
                skinViewer.controls.enablePan = false;
                skinViewer.autoRotate = false;
                skinViewer.zoom = 0.95;
                skinViewer.background = null;
            } catch (err) {
                console.error("Skin viewer failed to load:", err);
                canvas.parentElement.innerHTML = '<p style="color:#888; font-style:italic;">Skin viewer unavailable right now.</p>';
            }

            const canvas2 = document.getElementById("skinCanvas2");
            try {
                const skinViewer2 = new skinview3d.SkinViewer({
                    canvas: canvas2,
                    width: 260,
                    height: 380,
                    skin: "./assets/images/coop-skin.png"
                });
                skinViewer2.controls.enableRotate = true;
                skinViewer2.controls.enableZoom = true;
                skinViewer2.controls.enablePan = false;
                skinViewer2.autoRotate = false;
                skinViewer2.zoom = 0.95;
                skinViewer2.background = null;
            } catch (err) {
                console.error("Second skin viewer failed to load:", err);
            }
        })();
    </script>

    <script>
        let allGames = [];
        let currentPage = 1;
        let currentSortKey = 'hours';
        let currentSortDir = 'desc';
        let currentSearch = '';
        const PAGE_SIZE = 10;

        function renderMostPlayed(games) {
            const row = document.getElementById('mostPlayedRow');
            const top10 = games.slice(0, 10);
            row.innerHTML = top10.map(g => `
                <div class="game-card" title="${g.name}">
                    <img src="${g.header_image}" alt="${g.name}" loading="lazy"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="game-card-fallback">${g.name}</div>
                    <div class="game-card-badge">${g.hours}h &middot; ${g.pct}%</div>
                </div>
            `).join('');
            document.getElementById('mostPlayedSection').style.display = 'block';
        }

        function renderStats(gameCount, totalHours, topGame) {
            document.getElementById('statsStrip').innerHTML = `
                <div class="stat-block">
                    <div class="stat-number">${gameCount}</div>
                    <div class="stat-label">Games Owned</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number">${totalHours.toLocaleString()}</div>
                    <div class="stat-label">Hours Played</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number" style="font-size: 1.4rem;">${topGame}</div>
                    <div class="stat-label">Most Played</div>
                </div>
            `;
        }

        function updateSortIndicators() {
            document.querySelectorAll('#libraryTable th').forEach(th => {
                const key = th.getAttribute('data-sort');
                const base = th.textContent.replace(/ [▲▼]$/, '');
                th.textContent = base;
                if (key === currentSortKey) {
                    th.textContent += currentSortDir === 'asc' ? ' ▲' : ' ▼';
                }
            });
        }

        function renderLibrary() {
            const tbody = document.getElementById('libraryTableBody');
            const paginationEl = document.getElementById('libraryPagination');
            tbody.innerHTML = '';
            paginationEl.innerHTML = '';

            let games = allGames.filter(g => g.name.toLowerCase().includes(currentSearch.toLowerCase()));

            const dir = currentSortDir === 'asc' ? 1 : -1;
            games.sort((a, b) => {
                if (currentSortKey === 'name') return a.name.localeCompare(b.name) * dir;
                if (currentSortKey === 'hours') return (a.minutes - b.minutes) * dir;
                if (currentSortKey === 'pct') return (a.pct - b.pct) * dir;
                if (currentSortKey === 'recent') return (a.last_played_ts - b.last_played_ts) * dir;
                return 0;
            });

            updateSortIndicators();

            if (games.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888; font-style:italic;">No games match that search.</td></tr>';
                return;
            }

            const totalPages = Math.max(1, Math.ceil(games.length / PAGE_SIZE));
            currentPage = Math.min(currentPage, totalPages);
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageItems = games.slice(start, start + PAGE_SIZE);

            pageItems.forEach(g => {
                const tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                tr.addEventListener('click', () => {
                    window.open(`https://store.steampowered.com/app/${g.appid}`, '_blank', 'noopener');
                });
                tr.innerHTML = `
                    <td data-label="Game" style="text-align:left; display:flex; align-items:center; gap:0.6rem;">
                        <span class="library-thumb-wrap">
                            <img src="${g.header_image}" alt="" loading="lazy" class="library-thumb-img"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <span class="library-thumb-fallback">🎮</span>
                        </span>
                        <span>${g.name}</span>
                    </td>
                    <td data-label="Hours Played">${g.hours}</td>
                    <td data-label="% of Playtime">${g.pct}%</td>
                    <td data-label="Last Played">${g.last_played || 'Never'}</td>
                `;
                tbody.appendChild(tr);
            });

            if (totalPages > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'archive-page-btn';
                prevBtn.textContent = '← Prev';
                prevBtn.disabled = currentPage === 1;
                prevBtn.addEventListener('click', () => { currentPage--; renderLibrary(); });

                const label = document.createElement('span');
                label.className = 'archive-page-label';
                label.textContent = `Page ${currentPage} of ${totalPages}`;

                const nextBtn = document.createElement('button');
                nextBtn.className = 'archive-page-btn';
                nextBtn.textContent = 'Next →';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.addEventListener('click', () => { currentPage++; renderLibrary(); });

                paginationEl.appendChild(prevBtn);
                paginationEl.appendChild(label);
                paginationEl.appendChild(nextBtn);
            }
        }

        document.getElementById('librarySearch').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            renderLibrary();
        });

        document.querySelectorAll('#libraryTable th').forEach(th => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', () => {
                const key = th.getAttribute('data-sort');
                if (currentSortKey === key) {
                    currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSortKey = key;
                    currentSortDir = key === 'name' ? 'asc' : 'desc';
                }
                currentPage = 1;
                renderLibrary();
            });
        });

        async function loadGames() {
            let data = { games: [], game_count: 0, total_hours: 0 };
            try {
                const res = await fetch('data/games.json');
                data = await res.json();
            } catch (e) {
                console.log('games.json not available yet');
            }

            allGames = data.games || [];
            if (allGames.length === 0) return;

            renderStats(data.game_count, data.total_hours, allGames[0].name);

            if (data.last_updated) {
                document.getElementById('lastUpdatedCaption').textContent = `Library snapshot last updated: ${data.last_updated}`;
            }

            renderMostPlayed(allGames);
            renderLibrary();
        }

        async function loadHypixel() {
            let data = null;
            try {
                const res = await fetch('data/hypixel.json');
                data = await res.json();
            } catch (e) {
                console.log('hypixel.json not available yet');
                return;
            }

            document.getElementById('hypixelUpdatedCaption').textContent = `Stats last updated: ${data.last_updated}`;

            const g = data.general;
            document.getElementById('hypixelGeneralStrip').innerHTML = `
                <div class="stat-block">
                    <div class="stat-number" style="font-size:1.4rem;">${g.rank}</div>
                    <div class="stat-label">Current Rank</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number">${g.network_level}</div>
                    <div class="stat-label">Network Level</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number" style="font-size:1.4rem;">${g.karma}</div>
                    <div class="stat-label">Karma</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number">${g.achievement_points}</div>
                    <div class="stat-label">Achievement Points</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number" style="font-size:1.1rem;">${g.first_login}</div>
                    <div class="stat-label">First Login</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number" style="font-size:1.1rem;">${g.last_login}</div>
                    <div class="stat-label">Last Login</div>
                </div>
            `;

            const grid = document.getElementById('hypixelGameGrid');
            grid.innerHTML = data.games.map(game => `
                <div class="hypixel-game-card">
                    <h3>
                        <img class="hypixel-icon" src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.4/assets/minecraft/textures/item/${game.icon}.png" alt="" onerror="this.style.display='none';">
                        ${game.name}
                    </h3>
                    ${game.stats.map(s => `
                        <div class="hypixel-stat-row">
                            <span class="hypixel-stat-label">${s.label}</span>
                            <span class="hypixel-stat-value">${s.value}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');

            if (data.skyblock) {
                renderSkyblock(data.skyblock);
            }
        }

        function renderSkyblock(sb) {
            const panel = document.getElementById('skyblockPanel');
            panel.innerHTML = `
                <h3 class="skyblock-panel-title">
                    <img class="hypixel-icon" src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.4/assets/minecraft/textures/item/grass_block.png" alt="" onerror="this.style.display='none';">
                    SkyBlock — ${sb.profile_name} Profile
                </h3>

                <div class="skyblock-key-stats">
                    <div class="stat-block"><div class="stat-number">${sb.overall_level}</div><div class="stat-label">Skill Level</div></div>
                    <div class="stat-block"><div class="stat-number">${sb.networth}</div><div class="stat-label">Networth</div></div>
                    <div class="stat-block"><div class="stat-number">${sb.purse}</div><div class="stat-label">Purse</div></div>
                    <div class="stat-block"><div class="stat-number">${sb.bank}</div><div class="stat-label">Bank</div></div>
                    <div class="stat-block"><div class="stat-number">${sb.fairy_souls}</div><div class="stat-label">Fairy Souls</div></div>
                    <div class="stat-block"><div class="stat-number" style="font-size:1.1rem;">${sb.first_join}</div><div class="stat-label">First Joined</div></div>
                    ${sb.coop_members.map(m => `
                        <div class="stat-block skyblock-coop-stat">
                            <img src="./assets/images/coop-face.png" alt="${m.name}">
                            <div class="stat-label">${m.name}</div>
                        </div>
                    `).join('')}
                </div>

                <div class="skyblock-columns">
                    <div class="skyblock-column">
                        <h4>Skills</h4>
                        ${sb.skills.map(s => `
                            <div class="hypixel-stat-row">
                                <span class="hypixel-stat-label">${s.name}</span>
                                <span class="hypixel-stat-value">${s.level}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="skyblock-column">
                        <h4>Slayers</h4>
                        ${sb.slayers.map(s => `
                            <div class="hypixel-stat-row">
                                <span class="hypixel-stat-label">${s.name}</span>
                                <span class="hypixel-stat-value">Tier ${s.tier}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="skyblock-column">
                        <h4>Top Pets</h4>
                        ${sb.top_pets.map(p => `
                            <div class="hypixel-stat-row">
                                <span class="hypixel-stat-label">${p.name}</span>
                                <span class="hypixel-stat-value">${p.tier}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        loadHypixel();
        loadGames();
    </script>


    <button class="back-to-top-btn" id="backToTopBtn" aria-label="Back to top" title="Back to top">&uarr;</button>

    <script>
        (function () {
            const btn = document.getElementById('backToTopBtn');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });
            btn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();
    </script>
</body>
</html>
